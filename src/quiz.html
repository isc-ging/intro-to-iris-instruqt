<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HoleFoods - Data Challenge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 32px 16px;
      color: #222;
    }

    .card {
      max-width: 520px;
      margin: 0 auto;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .card-header {
      background: #2e7d32;
      color: #fff;
      padding: 18px 24px;
    }

    .card-header h2 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 600;
    }

    .card-header p {
      margin: 4px 0 0;
      font-size: 0.83rem;
      opacity: 0.85;
    }

    .card-body {
      padding: 24px;
    }

    .question {
      font-size: 1.05rem;
      font-weight: 600;
      color: #222;
      margin: 0 0 20px;
      line-height: 1.4;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }

    .option-label {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border: 2px solid #d0d5dd;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      font-size: 0.95rem;
    }

    .option-label:hover {
      border-color: #2e7d32;
      background: #f6faf6;
    }

    .option-label input[type="radio"] {
      width: 18px;
      height: 18px;
      accent-color: #2e7d32;
      flex-shrink: 0;
    }

    .option-label.selected {
      border-color: #2e7d32;
      background: #f0f9f0;
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      background: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 6px;
      transition: background 0.15s;
    }

    .btn-submit:hover:not(:disabled) { background: #1b5e20; }
    .btn-submit:disabled { background: #bbb; cursor: not-allowed; }

    .result-box {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      display: none;
    }

    .result-box.success {
      background: #ecfdf5;
      border: 1px solid #6ee7b7;
      color: #065f46;
    }

    .result-box.error {
      background: #fff1f0;
      border: 1px solid #fca5a5;
      color: #991b1b;
    }

    .result-box .result-title {
      font-weight: 700;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-header">
      <h2>Challenge!</h2>

    </div>
    <div class="card-body">

      <p class="question">How many units of pasta have been sold in Rome, Italy?</p>

      <form id="quizForm">
        <div class="options">
          <label class="option-label">
            <input type="radio" name="answer" value="29"> 29 units
          </label>
          <label class="option-label">
            <input type="radio" name="answer" value="35"> 35 units
          </label>
          <label class="option-label">
            <input type="radio" name="answer" value="42"> 42 units
          </label>
          <label class="option-label">
            <input type="radio" name="answer" value="51"> 51 units
          </label>
          <label class="option-label">
            <input type="radio" name="answer" value="15"> 15 units
          </label>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit" disabled>Submit Answer</button>

        <div id="resultBox" class="result-box">
          <div class="result-title" id="resultTitle"></div>
          <div id="resultMessage"></div>
        </div>
      </form>

    </div>
  </div>

  <script>
    var radios = document.querySelectorAll('input[type="radio"]');
    radios.forEach(function(r) {
      r.addEventListener('change', function() {
        document.querySelectorAll('.option-label').forEach(function(l) {
          l.classList.remove('selected');
        });
        r.parentElement.classList.add('selected');
        document.getElementById('submitBtn').disabled = false;
      });
    });

    function showResult(type, title, message) {
      var box = document.getElementById('resultBox');
      box.className = 'result-box ' + type;
      box.style.display = 'block';
      document.getElementById('resultTitle').textContent = title;
      document.getElementById('resultMessage').textContent = message;
    }

    document.getElementById('quizForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Checking...';

      var selected = document.querySelector('input[name="answer"]:checked');
      if (!selected) {
        btn.disabled = false;
        btn.textContent = 'Submit Answer';
        return;
      }

      try {
        var resp = await fetch('/api/holeFoods/quizcheck', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ answer: parseInt(selected.value, 10) })
        });
        var data = await resp.json();

        if (data.correct) {
          showResult('success', 'Correct!', data.message || 'That is the right answer.');
        } else {
          showResult('error', 'Not quite', data.message || 'Try again.');
          btn.disabled = false;
          btn.textContent = 'Submit Answer';
        }
      } catch (err) {
        showResult('error', 'Connection error', err.message);
        btn.disabled = false;
        btn.textContent = 'Submit Answer';
      }
    });
  </script>
</body>
</html>
